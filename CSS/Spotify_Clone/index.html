<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="icon" href = "./assests/logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="main">

    <div class="side_bar">
        <div class="nav">
            <div class="nav-option" style="opacity: 1;">
                <i class="fa-solid fa-house"></i>
                <a href="#">Home</a>
            </div>
            <div class="nav-option">
                <i class="fa-solid fa-magnifying-glass"></i>
                <a href="#">Search</a>
            </div>
        </div>
        <div class="library">
            <div class="options">
                <div class="library-options nav-option">
                    <img src="./assests/library_icon.png" alt="lin_icon">
                    <a href="#">Library</a>
                </div>
                <div class="icons">
                    <i class="fa-solid fa-arrow-right-long nav-option"></i>
                    <i class="fa-solid fa-plus nav-option"></i>
                </div>
            </div>
            <div class="box">
                <p class="boxP1">Create your first playlist</p>
                <p class="boxP2">It's easy, we'll help you</p>
                <button class="badge badge_nav">Create Playlist</button>
            </div>
            <div class="box">
                <p class="boxP1">Let's find some podcasts to follow</p>
                <p class="boxP2">We'll keep you updated on new episodes</p>
                <button class="badge badge_nav">Browse podcasts</button>
            </div>
        </div>

    </div>

    <div class="main_content">
        <div class="sticky-nav">
            <div class="farward_backward">
                <img src="./assests/backward_icon.png" alt="">
                <img src="./assests/forward_icon.png" class="hide" alt="">
            </div>
            <div class="sticky-nav-buttons">
                <button class="badge">Explore Premium</button>
                <button class="badge dark-badge hide "> <i class="fa-regular fa-circle-down "  <style="margin-right : 4px;"></i> Install App</button>
                <i class="fa-solid fa-circle-user user_icon"></i>
            </div>
        </div>
        <div class="cards">
        </div>
        
    </div>
    <div class="music_player">music_player</div>
</div>
</body>
</html>
